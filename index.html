<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- title -->
    <title>English || Janala</title>
    <!-- style.css & favicon -->
     <link rel="stylesheet" href="style.css">
     <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
</head>
<body class="max-w-[1920px] mx-auto">
    <!-- header part -->
     <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"        stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
                    </div>
                    <ul
                    tabindex="-1"
                    class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow space-y-4">
                    <a href="" class=""><i class="fa-solid fa-circle-question"></i> FAQ</a>
                    <a href="" class=""><i class="fa-solid fa-book-open"></i> Learn</a>
                    <a href="" class=""><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                    </ul>
                </div>
                <a href="" class="flex gap-1 items-center">
                    <span class="text-lg font-bold">English</span>
                    <img src="./assets/logo.png" alt="">
                    <span class="text-lg font-semibold">বাংলা</span>
                </a>
            </div>

            <div class="navbar-end hidden md:flex">
                <ul class="menu menu-horizontal px-1 space-x-4">
                    <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</a>
                    <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i> Learn</a>
                    <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>

                </ul>
            </div>

        </div>
     </header>
     <!-- hero section part -->
      <section class="flex flex-col-reverse md:flex-row gap-5 justify-between items-center py-10 w-11/12 mx-auto">
        <div class="content text-center md:text-start">
            <h1 class="font-bold text-4xl mb-8">
                <span class="text-sky-400">English</span>
                is Easy!!
            </h1>
            <p class="font-bangla font-medium md:w-[70%] mb-7">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
            </p>

            <div class="flex flex-col space-y-5 mb-5">
                <input type="text" placeholder="Enter Your Name" class="input input-neutral outline-none border-[#18181B33]" />
                <input type="password" placeholder="Password" class="input input-neutral outline-none border-[#18181B33]" />
            </div>
            <button class="btn btn-neutral bg-[#422AD5] border-[#3D26C7]">Get Started</button>
        </div>

        <div class="image ">
            <img src="./assets/hero-student pic 3.png" alt="">
        </div>
      </section>
      <!-- lesson section part -->
       <section>
            <h1 class="font-bold text-4xl mb-8 text-center">
                <span class="text-sky-400">Let's</span> Learn Vocabularies
            </h1>

            <div id="lesson-container" class="flex gap-5 justify-center flex-wrap">

            </div>
       </section>
<script src="./script/index.js"></script>       
</body>
</html>
